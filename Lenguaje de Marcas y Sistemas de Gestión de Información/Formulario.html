<!doctype html>
<html>
     <head>
	    <title>Formulario</title>
		<meta charset="utf-8">
    	<style type="text/css">
			input[type='text']:invalid{border-color: red;}
			input[type='text']:valid{border-color: green;}
			input[type='text']:focus{outline: none;}
		</style>
	
	</head>
	<body style="background-color: lightsalmon;color: black;">

		<h1 style="text-align: center;text-decoration: underline;color: black;">FORMULARIO</h1>

		<center><a id="Registro"><table style="background-color: rgb(201, 165, 4);color: white;border: 2px black solid;padding: 32px;"></a>
		<tr>
		<td colspan="2"><h1 style="text-align: center;">Formulario de registro</h1></td>
		</tr>
		<tr>
		<form action="mailto:adfg@asd.es" method="post" enctype="text/plain">
			<tr>
				<td style="text-align: right;"><label for="u">Introduzca su nombre</label></td>
				<td style="text-align: left;"><input type="text" name="usuario" id="u" size="27" maxlength="8" placeholder="Nombre de usuario" autofocus autocomplete="off"><br></td>
			</tr>

			<tr>
				<td style="text-align: right;"><label for="e">Introuzca su e-mail:</label></td>
				<td style="text-align: left;"><input type="text" name="email" id="e" placeholder="e-mail"><br></td>
			</tr>

			<tr>
				<td style="text-align: right;"><label for="d">Dirección:</label></td>
				<td style="text-align: left;"><input type="text" name="dir" id="d" size="35" maxlength="50" placeholder="Ej: Calle Benjamín Palencia, num 0, piso 1A"><br></td>
			</tr>

			<tr>
				<td style="text-align: right;"><label for="t">Teléfono:</label></td>
				<td style="text-align: left;"><input type="text" name="tlf" id="t" size="12" maxlength="12" placeholder="+34 123456789" pattern="[\+][0-9]{11}"><br></td>
			</tr>

			<tr>
				<td style="text-align: right;"><label for="ed">Edad:</label></td>
				<td style="text-align: left;"><input type="number" name="edad" id="ed" size="3" maxlength="3" value="0"><br></td>
			</tr>
			<tr>
				<td style="text-align: right;"><label for="p">Provincia</label></td>
				<td style="text-align: left;"><input type="text" name="pbc" id="p" size="20" maxlength="30" placeholder="Ej: Madrid"><br></td>
			</tr>

			<tr>
				<td style="text-align: right;"><input type="submit" value="Enviar Datos" name="Enviar"></td>
				<td style="text-align: left;"><input type="reset" value="Resetear Datos" name="Limpiar"></td>
			</tr>
		</form>
		</tr>

		<center><a id="Compra"><table style="background-color: rgb(201, 165, 4);border: black 2px solid;"></a>
		<form action="mailto:adfg@asd.es" method="post" enctype="text/plain">

			<input type="hidden" name="control" value="encuesta_gustos">
			<tr>
				<td><fieldset>
				<legend style="border: dotted cyan 3px;text-align: center;"><label>¿Con qué frecuencia compra en esta web?</label><br></legend>
					<center><table style="border-top: 2px solid black;border-bottom: 2px solid black;border-collapse: collapse;width: 450px;">
						<tr style="background-color: lightcyan;">
							<td style="border-bottom: 1px solid black;"><legend><input type="radio" name="pdeporte" value="0">Nunca había comprado<br></legend></td>
						</tr>
						<tr style="background-color: lightcyan;">
							<td style="border-bottom: 1px solid black;"><legend><input type="radio" name="pdeporte" value="1">1 vez al mes<br></legend></td>
						</tr>
						<tr style="background-color: lightcyan;">
							<td style="border-bottom: 1px solid black;"><legend><input type="radio" name="pdeporte" value="2">2 veces al mes<br></legend></td>
						</tr>
						<tr style="background-color: lightcyan;">
							<td style="border-bottom: 1px solid black;"><legend><input type="radio" name="pdeporte" value="3">3 veces al mes<br></legend></td>
						</tr>
						<tr style="background-color: lightcyan;">
							<td style="border-bottom: 1px solid black;"><legend><input type="radio" name="pdeporte" value=">3" id="depor"><label for="depor">Más de 3 veces al mes</label><br></legend></td>
						</tr>
					</table></center></fieldset></td>
					<tr style="text-align: center;">
						<td><input type="submit" value="Enviar Datos">
						<input type="reset" value="Borrar Datos" name="Limpiar"></td>
					</tr>
					
	</table></center><br><br>

	<center><a id="Final"><table style="background-color: cornflowerblue;color: white;border: 3px solid yellow;border-collapse: collapse;"></a>
		<tr>
		<td colspan="3" style="border-bottom: 2px solid yellow;"><h1 style="text-align: center;">Formulario de compra</h1></td>
		</tr>
		<tr>
		<form action="mailto:adfg@asd.es" method="post" enctype="text/plain">
			<tr style="border: solid yellow 2px;">
				<td colspan="2" style="text-align: center;border: solid yellow 2px;"><label>Seleccione el número de camisetas que ha obtenido:</label></td>
				<td colspan="2" style="text-align: center;border: solid yellow 2px;">
					<select name="camisetas">
						<option>1</option>
						<option>2</option>
						<option>3</option>
						<option>4</option>
						<option>5</option>
						<option>6</option>
						<option>7</option>
						<option>8</option>
						<option>9</option>
						<option>10</option>
					</select><br></td>
			</tr>

			<tr>
				<td colspan="2" style="text-align: center;border: solid yellow 2px;"><label for="12">Indique cuál es su grupo favorito para comprar:</label></td>
				<td style="text-align: center;border: solid yellow 2px;">
					<select name="Ligas" id="12">
						<option value="LaLiga">LaLiga</option>
						<option value="PremierLeague" selected>Premier League</option>
						<option value="Ligue1">Ligue 1</option>
						<option value="Bundesliga">Bundesliga</option>
						<option value="SerieA">Serie A</option>
						<option value="Selecciones">Selecciones</option>
					</select><br></td>
			</tr>

			<tr>
				<td style="text-align: center;border: solid yellow 2px;" colspan="3">
					<select name="dia">
						<option selected disabled>Seleccione el día de la semana que compró</option>
						<option value="L">Lunes</option>
						<option value="M">Martes</option>
						<option value="X">Miércoles</option>
						<option value="J">Jueves</option>
						<option value="V">Viernes</option>
						<option value="S" disabled>Sábado</option>
						<option value="D" disabled>Domingo</option>
					</select><br></td>
			</tr>

			<tr>
				<td colspan="2" style="text-align: center;border: solid yellow 2px;"><label for="14">Elige compañía de transporte:</label></td>
				<td style="text-align: center;border: solid yellow 2px;">
					<select name="compañía" id="14" disabled>
						<option selected disabled>DHL</option>
						<option>SEUR</option>
						<option>UPS</option>
					</select><br></td>
			</tr>

			
			<tr>
			<td style="border: 1px solid black;text-align: center;"><label>Seleccione su equipo favorito:</label><br></td>
			<td style="border: 2px yellow solid;text-align: center;">
				<select name="EquipoFav" size="7">
					<option selected>Real Madrid</option>
					<option>F.C Barcelona</option>
					<option>Atlético de Madrid</option>
					<option>Rayo Vallecano</option>
					<option>F.C Bayern</option>
					<option>Livrpool</option>
					<option>Otro:</option>
				</select><br></td>
			<td  style="border: 2px yellow solid;"><textarea name="Otro" rows="6" cols="40" placeholder="Escriba su equipo favorito" wrap="soft" maxlength="50" minlength="25"></textarea><br></td>
			<tr>
				<td  style="border: 2px yellow solid;text-align: center;"><input type="image" src="4698729.png" width="70px" value="Enviar datos 2" name="Envío2"><br></td>
				
				<td style="text-align: center; border: 2px yellow solid;"><table>
				<tr>
					<td style="text-align: center;"><img src="4889662.png" width="50" alt="Reset button" title="Reset button"></td>
				</tr>
				<tr>
					<td>Resetear</td>
				</tr>
				</table></td>
				<td style="background-image: url(futbol-1-1200x766.jpg);background-size: 100% 100%;"></td>
			</tr>
		</tr>
		</form>
		</tr>
	</table></center><br><br>

	<center><table style="background-color: deepskyblue; border: 2px rebeccapurple solid;padding: 50px;">
		<tr>
			<td><h1>Formulario Final</h1></td>
		</tr>
		<tr>
			<td><form action="mailto:adfg@asd.es" method="post" enctype="text/plain">
			<label>Última fecha de compra en la web:</label>
			<input type="date" name="fecha" min="2025-11-01" max="2026-06-15" value="2026-01-15"></td>
			<td><input type="submit" value="Enviar"></td>
		</tr>
		<tr>
			<form action="http://www.google.com/search" method="get" enctype="text/plain">
			<td><label>Buca aquí la camiseta que desees comprar:</label>
			<input type="search" name="q"></td>
			<td><input type="submit" value="Enviar"></td></form>
		</tr>
		<tr>
			<td><label>Calcule el precio final de su compra:</label>
			<form method="post" oninput="resultado.value=parseInt(valor1.value)+parseInt(valor2.value)">
			<input type="number" id="valor1" value="0">
			+
			<input type="number" id="valor2" value="0">
			=
			<output name="resultado" for="valor1 valor2"></output>
			</form></td>
			<td><input type="submit" value="Enviar"></td>
		</tr>
		<tr>
			<td><form action="mailto:adfg@asd.es" method="post" enctype="text/plain" oninput="final.value=rg.value">
			<label for="rg">Evalúa tu experiencia comprando:</label>
			<input type="range" name="nota1" min="0" max="10" value="5" step="0.25" id="rg" list="a">
			<output name="final" for="rg"></output>
			<input type="submit" value="Enviar">
			
			<datalist id="a">
				<option value="0"></option>
				<option value="1"></option>
				<option value="2"></option>
				<option value="3"></option>
				<option value="4"></option>
				<option value="5"></option>
				<option value="6"></option>
				<option value="7"></option>
				<option value="8"></option>
				<option value="9"></option>
				<option value="10"></option>
			</datalist></td>
		</tr>
	</table></center>


		
	    
	</body>
</html>
